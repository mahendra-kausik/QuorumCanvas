services:
  replica1:
    image: asia-south1-docker.pkg.dev/mini-raft-prod/mini-raft/replica:latest
    build: ./replica
    ports:
      - "3001:3001"
    volumes:
      - replica1-data:/app/instance
    environment:
      REPLICA_ID: "replica1"
      PORT: "3001"
      PEERS: "http://replica2:3002,http://replica3:3003"
      DATA_DIR: "/app/instance"
      SNAPSHOT_THRESHOLD: "${SNAPSHOT_THRESHOLD:-500}"
    networks:
      - raft-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  replica2:
    image: asia-south1-docker.pkg.dev/mini-raft-prod/mini-raft/replica:latest
    build: ./replica
    ports:
      - "3002:3002"
    volumes:
      - replica2-data:/app/instance
    environment:
      REPLICA_ID: "replica2"
      PORT: "3002"
      PEERS: "http://replica1:3001,http://replica3:3003"
      DATA_DIR: "/app/instance"
      SNAPSHOT_THRESHOLD: "${SNAPSHOT_THRESHOLD:-500}"
    networks:
      - raft-net
    depends_on:
      replica1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  replica3:
    image: asia-south1-docker.pkg.dev/mini-raft-prod/mini-raft/replica:latest
    build: ./replica
    ports:
      - "3003:3003"
    volumes:
      - replica3-data:/app/instance
    environment:
      REPLICA_ID: "replica3"
      PORT: "3003"
      PEERS: "http://replica1:3001,http://replica2:3002"
      DATA_DIR: "/app/instance"
      SNAPSHOT_THRESHOLD: "${SNAPSHOT_THRESHOLD:-500}"
    networks:
      - raft-net
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  gateway:
    image: asia-south1-docker.pkg.dev/mini-raft-prod/mini-raft/gateway:latest
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      RAFT_PEERS: "http://replica1:3001,http://replica2:3002,http://replica3:3003"
      # L6: the one real secret this project has — set in .env, never committed (CLAUDE.md §4).
      AUTH_TOKEN: "${AUTH_TOKEN:?set AUTH_TOKEN in .env}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS in .env, e.g. the Vercel origin}"
    networks:
      - raft-net
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # L7: public HTTPS/WSS entry point. The gateway itself stays on the internal raft-net;
  # cloudflared is the only piece of this stack exposed to the internet. Disabled by default
  # (profile-gated) so `docker compose up` with no profile still exercises the whole cluster
  # locally without a real Cloudflare account/token — see DEPLOY.md for L7b bring-up.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      # Not `:?`-required at the compose-file level: `docker compose` interpolates every
      # service's env regardless of --profile, so a hard requirement here would also block
      # the token-free `quicktunnel` profile. If you actually invoke the `tunnel` profile
      # without setting this, cloudflared fails at container startup instead — see DEPLOY.md.
      TUNNEL_TOKEN: "${TUNNEL_TOKEN:-}"
    networks:
      - raft-net
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tunnel

  # L7b: token-free alternative for a Cloudflare account with no domain — prints an ephemeral
  # https://<random>.trycloudflare.com hostname to its logs instead of routing a stable named
  # hostname. Same gateway target, same isolation from the public interface; the tradeoff is
  # the URL changes if this container restarts (see DEPLOY.md).
  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://gateway:8080
    networks:
      - raft-net
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - quicktunnel

networks:
  raft-net:
    driver: bridge

volumes:
  replica1-data:
  replica2-data:
  replica3-data:
